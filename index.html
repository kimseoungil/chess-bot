<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="gameArea">
        <div class="captured-panel">
            <h2>Captured by You</h2>
            <div id="capturedByPlayer" class="captured-pieces"></div>
        </div>
        <div id="board"></div>
        <div class="captured-panel">
            <h2>Captured by AI</h2>
            <div id="capturedByAI" class="captured-pieces"></div>
        </div>
    </div>
    <div id="controls">
        <label for="difficulty">Difficulty:</label>
        <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
        </select>
        <label for="playerColor">Side:</label>
        <select id="playerColor">
            <option value="white">White</option>
            <option value="black">Black</option>
        </select>
        <button id="startButton">Start Game</button>
        <button id="undoButton">Undo Move</button>
    </div>
    <p id="statusMessage">Choose difficulty and side, then press Start Game.</p>
    <script src="main.js"></script>
</body>
</html>
